name: 京东比价
description: 打开京东点开商品“详情”页显示历史价格，无需获取第三方Cookie，接口稳定性不确定。
dns: {}
scriptings:
- http_response:
    name: jd_price
    match: ^https?:\/\/in\.m\.jd\.com\/product\/graphext\/\d+\.html
    script_url: https://raw.githubusercontent.com/WeiGiegie/666/main/bijia.js
    timeout: 60
    body_required: true
mitm:
  hostnames:
    includes:
    - in.m.jd.com
